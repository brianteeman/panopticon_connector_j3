PLG_SYSTEM_PANOPTICON_CONFIG_SYSINFO_LABEL="Signaler les informations systeme"
PLG_SYSTEM_PANOPTICON_CONFIG_SYSINFO_DESC="Collecter et signaler des informations systeme telles que l'utilisation du processeur, l'utilisation du disque, etc. Cela est utile pour depanner les problemes de performance du serveur, mais certains hebergeurs pretendent que vous n'etes pas autorise a les collecter et peuvent vous compliquer la tache. Dans ce cas, desactivez cette fonctionnalite jusqu'a ce que vous deplaciez votre site vers un hebergeur correct."
PLG_SYSTEM_PANOPTICON_CONFIG_ALLOW_REMOTE_INSTALL_LABEL="Autoriser l'installation a distance des extensions"
PLG_SYSTEM_PANOPTICON_CONFIG_ALLOW_REMOTE_INSTALL_DESC="Autoriser Akeeba Panopticon a installer des extensions a distance sur ce site. Desactivez cette option si vous ne souhaitez pas autoriser l'installation a distance des extensions pour des raisons de securite."
