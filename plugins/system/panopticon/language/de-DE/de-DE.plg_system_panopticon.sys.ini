PLG_SYSTEM_PANOPTICON_CONFIG_SYSINFO_LABEL="Systeminformationen melden"
PLG_SYSTEM_PANOPTICON_CONFIG_SYSINFO_DESC="Systeminformationen wie CPU-Auslastung, Festplattennutzung usw. erfassen und melden. Dies ist hilfreich bei der Fehlersuche bei Serverleistungsproblemen, aber manche Hoster tun so, als duerften Sie diese Informationen nicht erfassen, und machen Ihnen moeglicherweise das Leben schwer. Deaktivieren Sie diese Funktion in diesem Fall, bis Sie Ihre Website zu einem vernuenftigen Hoster umziehen."
PLG_SYSTEM_PANOPTICON_CONFIG_ALLOW_REMOTE_INSTALL_LABEL="Remote-Installation von Erweiterungen erlauben"
PLG_SYSTEM_PANOPTICON_CONFIG_ALLOW_REMOTE_INSTALL_DESC="Akeeba Panopticon erlauben, Erweiterungen auf dieser Website remote zu installieren. Deaktivieren Sie dies, wenn Sie aus Sicherheitsgruenden keine Remote-Installation von Erweiterungen zulassen moechten."
