PLG_SYSTEM_PANOPTICON_CONFIG_SYSINFO_DESC="Recopilar e informar informacion del sistema, como el uso de CPU, el uso de disco, etc. Esto es util para solucionar problemas de rendimiento del servidor, pero algunos proveedores de alojamiento fingen que no se le permite recopilarla y pueden ponerle trabas. En ese caso, desactive esta funcion hasta que traslade su sitio a un proveedor de alojamiento decente."
